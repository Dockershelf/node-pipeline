name: Builder images

on:
  push:
    branches: [main]
    paths:
      - 'dockerfiles/**'
      - 'make-new-image'
      - 'Makefile'
      - 'scripts/ci-setup-workspace.sh'
      - 'scripts/ci-pull-builder-images.sh'
      - '.github/workflows/builder-images.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dockerfiles/**'
      - 'make-new-image'
      - 'Makefile'
      - 'scripts/ci-setup-workspace.sh'
      - 'scripts/ci-pull-builder-images.sh'
      - '.github/workflows/builder-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/dockershelf/dockershelf-node-builder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout node-pipeline
        uses: actions/checkout@v4
        with:
          path: node-pipeline

      - name: Checkout reference node repo
        uses: actions/checkout@v4
        with:
          repository: Dockershelf/node22
          path: node22
          sparse-checkout: |
            debiandirs

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Dockerfiles
        working-directory: node-pipeline
        env:
          WORKSPACE: ${{ github.workspace }}
        run: make generate-dockerfiles

      - name: Build tools image
        uses: docker/build-push-action@v6
        with:
          context: node-pipeline/dockerfiles
          file: node-pipeline/dockerfiles/Dockerfile.tools
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/tools:latest
            ${{ env.IMAGE_PREFIX }}/tools:sha-${{ github.sha }}
          cache-from: type=gha,scope=node-tools
          cache-to: type=gha,mode=max,scope=node-tools

      - name: Build trixie builder image
        uses: docker/build-push-action@v6
        with:
          context: node-pipeline/dockerfiles
          file: node-pipeline/dockerfiles/Dockerfile.trixie
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/trixie:latest
            ${{ env.IMAGE_PREFIX }}/trixie:sha-${{ github.sha }}
          cache-from: type=gha,scope=node-trixie
          cache-to: type=gha,mode=max,scope=node-trixie

      - name: Build unstable builder image
        uses: docker/build-push-action@v6
        with:
          context: node-pipeline/dockerfiles
          file: node-pipeline/dockerfiles/Dockerfile.unstable
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/unstable:latest
            ${{ env.IMAGE_PREFIX }}/unstable:sha-${{ github.sha }}
          cache-from: type=gha,scope=node-unstable
          cache-to: type=gha,mode=max,scope=node-unstable
